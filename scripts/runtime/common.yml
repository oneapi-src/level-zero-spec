--- #--------------------------------------------------------------------------
type: header
desc: "Intel $OneApi Level-Zero Runtime API common types"
ordinal: "0"

--- #--------------------------------------------------------------------------
type: default_struct
desc: "Immediate Command List default descriptor for GPU devices"
class: $r
name: $xDefaultGPUImmediateCommandQueueDesc
base: ze_command_queue_desc_t
version: "1.14"
members:
    - type: $x_structure_type_t
      name: stype
      desc: "[in] type of this structure"
      init: $X_STRUCTURE_TYPE_COMMAND_QUEUE_DESC
    - type: void *
      name: pNext
      desc: "[in] pointer possible next extension structure in a chain"
      init: NULL
    - type: uint32_t
      name: ordinal
      desc: "[in] command queue group ordinal"
      init: 0
    - type: uint32_t
      name: index
      desc: |
            [in] command queue index within the group;
            must be zero.
      init: 0
    - type: $x_command_queue_flags_t
      name: flags
      desc: |
            [in] usage flags.
            must be 0 (default) or a valid combination of $x_command_queue_flag_t;
            default behavior may use implicit driver-based heuristics to balance latency and throughput.
      init: $X_COMMAND_QUEUE_FLAG_IN_ORDER | $X_COMMAND_QUEUE_FLAG_COPY_OFFLOAD_HINT
    - type: $x_command_queue_mode_t
      name: mode
      desc: "[in] operation mode"
      init: $X_COMMAND_QUEUE_MODE_ASYNCHRONOUS
    - type: $x_command_queue_priority_t
      name: priority
      desc: "[in] priority"
      init: $X_COMMAND_QUEUE_PRIORITY_NORMAL
--- #--------------------------------------------------------------------------
type: default_struct
desc: "Device Unified Shared Memory Allocation default descriptor for GPU devices"
class: $r
name: $xDefaultGPUDeviceMemAllocDesc
base: ze_device_mem_alloc_desc_t
version: "1.14"
members:
    - type: $x_structure_type_t
      name: stype
      desc: "[in] type of this structure"
      init: $X_STRUCTURE_TYPE_DEVICE_MEM_ALLOC_DESC
    - type: void *
      name: pNext
      desc: "[in] pointer possible next extension structure in a chain"
      init: NULL
    - type: "$x_device_mem_alloc_flags_t"
      name: flags
      desc: |
            [in] flags specifying additional allocation controls.
            must be 0 (default) or a valid combination of $x_device_mem_alloc_flag_t;
            default behavior may use implicit driver-based heuristics.
      init: $X_DEVICE_MEM_ALLOC_FLAG_BIAS_CACHED
    - type: uint32_t
      name: ordinal
      desc: |
            [in] ordinal of the device's local memory to allocate from.
            must be less than the count returned from $xDeviceGetMemoryProperties.
      init: "0"
--- #--------------------------------------------------------------------------
type: default_struct
desc: "Host Unified Shared Memory Allocation default descriptor for GPU devices"
class: $r
name: $xDefaultGPUHostMemAllocDesc
base: ze_host_mem_alloc_desc_t
version: "1.14"
members:
    - type: $x_structure_type_t
      name: stype
      desc: "[in] type of this structure"
      init: $X_STRUCTURE_TYPE_HOST_MEM_ALLOC_DESC
    - type: void *
      name: pNext
      desc: "[in] pointer possible next extension structure in a chain"
      init: NULL
    - type: "$x_host_mem_alloc_flags_t"
      name: flags
      desc: |
            [in] flags specifying additional allocation controls.
            must be 0 (default) or a valid combination of $x_host_mem_alloc_flag_t;
            default behavior may use implicit driver-based heuristics.
      init: $X_HOST_MEM_ALLOC_FLAG_BIAS_CACHED | $X_HOST_MEM_ALLOC_FLAG_BIAS_INITIAL_PLACEMENT
--- #--------------------------------------------------------------------------
type: function
desc: "Retrieves a string describing the last error code returned by the default driver in the current thread."
version: "1.14"
class: $r
name: GetLastErrorDescription
details:
    - "String returned is thread local."
    - "String is only updated on calls returning an error, i.e., not on calls returning $X_RESULT_SUCCESS."
    - "String may be empty if driver considers error code is already explicit enough to describe cause."
    - "Memory pointed to by ppString is owned by the default driver."
    - "String returned is null-terminated."
params:
    - type: "const char**"
      name: ppString
      desc: "[in,out] pointer to a null-terminated array of characters describing cause of error."
--- #--------------------------------------------------------------------------
type: function
desc: "Translates device handle to integer identifier."
version: "1.14"
class: $r
name: TranslateDeviceHandleToIdentifier
details:
    - "The implementation of this function should be lock-free."
    - "This function does not return error code, to get info about failure user may use $rDriverGetLastErrorDescription function."
    - "In case of failure, this function returns UINT32_MAX."
params:
    - type: "$x_device_handle_t"
      name: hDevice
      desc: "[in] handle of the device"
returns:
    type: "uint32_t"
    desc: "integer identifier for the device"
    success: "integer identifier for the device"
    failure:
      - UINT32_MAX
--- #--------------------------------------------------------------------------
type: function
desc: "Translates to integer identifier to a device handle."
version: "1.14"
class: $r
name: TranslateIdentifierToDeviceHandle
details:
    - "The driver must be initialized before calling this function."
    - "The implementation of this function should be lock-free."
    - "This function does not return error code, to get info about failure user may use $rGetLastErrorDescription function."
    - "In case of failure, this function returns null."
    - "Details on the error can be retrieved using $rGetLastErrorDescription function."
params:
    - type: "uint32_t"
      name: identifier
      desc: "[in] integer identifier of the device"
returns:
    type: "ze_device_handle_t"
    desc: "handle of the device"
    success: "handle of the device with the given identifier"
    failure:
      - nullptr
--- #--------------------------------------------------------------------------
type: function
desc: "Retrieves handle to default context from the default driver."
version: "1.14"
class: $r
name: GetDefaultContext
details:
    - "The driver must be initialized before calling this function."
    - "The implementation of this function should be lock-free."
    - "This returned context contains all the devices available in the default driver."
    - "This function does not return error code, to get info about failure user may use $rGetLastErrorDescription function."
    - "In case of failure, this function returns null."
    - "Details on the error can be retrieved using $rGetLastErrorDescription function."
params: []
returns:
    type: "ze_context_handle_t"
    desc: "handle of the context"
    success: "handle of the default context"
    failure:
      - nullptr
