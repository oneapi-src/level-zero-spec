--- #--------------------------------------------------------------------------
type: header
desc: "Intel $OneApi Level-Zero Extension APIs for Image Format Support"
version: "1.15"
--- #--------------------------------------------------------------------------
type: macro
desc: "Image Format Support Extension Name"
version: "1.15"
name: $X_IMAGE_FORMAT_SUPPORT_EXT_NAME
value: '"$X_extension_image_format_support"'
--- #--------------------------------------------------------------------------
type: enum
desc: "Image Format Support Extension Version(s)"
version: "1.15"
name: $x_image_format_support_ext_version_t
etors:
    - name: "1_0"
      value: "$X_MAKE_VERSION( 1, 0 )"
      desc: "version 1.0"
--- #--------------------------------------------------------------------------
type: struct
desc: "Image format support query properties"
version: "1.15"
class: $xImage
name: $x_image_format_support_ext_properties_t
base: $x_base_properties_t
members:
    - type: $x_bool_t
      name: supported
      desc: "[out] boolean flag indicating whether the image format is supported on the queried device"
details:
    - "This structure may be passed to $xImageGetProperties via the pNext member of $x_image_properties_t."
    - "The implementation shall populate the supported field based on the $x_image_desc_t and $x_device_handle_t passed to $xImageGetProperties."
    - "This provides a mechanism to query format support without requiring image creation."