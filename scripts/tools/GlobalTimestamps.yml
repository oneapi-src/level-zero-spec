--- #--------------------------------------------------------------------------
type: header
desc: "Intel $OneApi Level-Zero Tool Experimental Extension for Global Metric Timestamps"
version: "1.5"
--- #--------------------------------------------------------------------------
type: macro
desc: "Global Metric Timestamps Experimental Extension Name"
version: "1.5"
name: $T_GLOBAL_METRICS_TIMESTAMPS_EXP_NAME
value: '"$XT_experimental_global_metric_timestamps"'
--- #--------------------------------------------------------------------------
type: enum
desc: "Global Metric Timestamps Experimental Extension Version(s)"
version: "1.5"
name: $x_metric_global_timestamps_exp_version_t
etors:
    - name: "1_0"
      value: "$X_MAKE_VERSION( 1, 0 )"
      desc: "version 1.0"
--- #--------------------------------------------------------------------------
type: struct
desc: "Metric timestamps resolution"
version: "1.5"
class: $tMetric
name: $t_metric_global_timestamps_resolution_exp_t
base: $t_base_desc_t
members:
    - type: uint64_t
      name: timerResolution
      desc: "[out] Returns the resolution of metrics timer (used for timestamps) in cycles/sec."
    - type: uint64_t
      name: timestampValidBits
      desc: "[out] Returns the number of valid bits in the timestamp value. (i.e can be used to calculate the max value of the hardware timestamp register or can be use to generate the mask of valid bits in the timestamp value)"
details:
    - "This structure may be returned from $tMetricGroupGetProperties via the `pNext` member of $t_metric_group_properties_t."
    - "Used for mapping metric timestamps to other timers."
--- #--------------------------------------------------------------------------
type: function
desc: "Returns metric timestamps synchronized with either host or device timestamps at the time of invoking the function"
version: "1.5"
class: $tMetricGroup
name: GetGlobalTimestampsExp
decl: static
details:
    - "The application may call this function from simultaneous threads."    
params:
    - type: "$t_metric_group_handle_t"
      name: hMetricGroup
      desc: "[in] handle of the metric group"
    - type: "$x_bool_t"
      name: synchronizedWithHost
      desc: "[in] if set to true, the globalTimestamp will reflect the host timestamp, else will reflect the device timestamp."
      init: "false"
    - type: "uint64_t*"
      name: globalTimestamp
      desc: |
            [out] if synchronizedWithHost is false, timestamp is in tick counts.
            [out] if synchronizedWithHost is true, the timestamp is in nanoseconds.
    - type: "uint64_t*"
      name: metricTimestamp 
      desc: |
            [out] Metric timestamp in tick counts.
