--- #--------------------------------------------------------------------------
type: header
desc: "Intel $OneApi Level-Zero Extension APIs for Virtual Memory Read-Only Properties"
version: "1.17"
--- #--------------------------------------------------------------------------
type: macro
desc: "Virtual Memory Read-Only Properties Extension Name"
version: "1.17"
name: $X_VIRTUAL_MEM_READONLY_PROPERTIES_EXT_NAME
value: '"$X_extension_virtual_mem_readonly_properties"'
--- #--------------------------------------------------------------------------
type: enum
desc: "Virtual Memory Read-Only Properties Extension Version(s)"
version: "1.17"
name: $x_virtual_mem_readonly_properties_ext_version_t
etors:
    - name: "1_0"
      value: "$X_MAKE_VERSION( 1, 0 )"
      desc: "version 1.0"
--- #--------------------------------------------------------------------------
type: enum
desc: "Read-only memory page capability values"
version: "1.17"
class: $xDevice
name: $x_device_readonly_memory_capability_t
etors:
    - name: NONE
      value: "0"
      desc: "Read-only attribute has no effect; the driver does not act on it."
    - name: HINT
      desc: "Read-only attribute is a performance hint to the OS; writes may still succeed without fault."
    - name: ENFORCED
      desc: "Read-only attribute is hardware-enforced; writes to read-only pages will cause a device fault."
--- #--------------------------------------------------------------------------
type: struct
desc: "Device read-only memory capability properties"
version: "1.17"
class: $xDevice
name: $x_device_readonly_memory_ext_properties_t
base: $x_base_properties_t
members:
    - type: $x_device_readonly_memory_capability_t
      name: readonlyCapability
      desc: |
            [out] Indicates device behavior when $X_MEMORY_ACCESS_ATTRIBUTE_READONLY is applied to a virtual memory page.
            $X_DEVICE_READONLY_MEMORY_CAPABILITY_NONE - the attribute has no effect; writes succeed normally.
            $X_DEVICE_READONLY_MEMORY_CAPABILITY_HINT - the attribute is a performance hint; writes may still succeed.
            $X_DEVICE_READONLY_MEMORY_CAPABILITY_ENFORCED - the attribute is hardware-enforced; writes cause a device fault.
details:
    - "This structure may be returned from $xDeviceGetProperties via the `pNext` member of $x_device_properties_t"
