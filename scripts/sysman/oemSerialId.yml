--- #--------------------------------------------------------------------------
type: header
desc: "Intel $OneApi Level-Zero Sysman Extension APIs for OEM Serial ID"
version: "1.17"
--- #--------------------------------------------------------------------------
type: macro
desc: "OEM Serial ID Extension Name"
version: "1.17"
name: $S_OEM_SERIAL_ID_EXT_NAME
value: '"$XS_extension_oem_serial_id"'
--- #--------------------------------------------------------------------------
type: enum
desc: "OEM Serial ID Extension Version(s)"
version: "1.17"
name: $s_oem_serial_id_ext_version_t
etors:
    - name: "1_0"
      value: "$X_MAKE_VERSION( 1, 0 )"
      desc: "version 1.0"
      version: "1.17"
--- #--------------------------------------------------------------------------
type: macro
desc: "Maximum OEM serial ID string size"
version: "1.17"
name: $S_OEM_SERIAL_ID_SIZE
value: "1024"
--- #--------------------------------------------------------------------------
type: struct
desc: "OEM Serial ID Properties structure"
version: "1.17"
class: $sDevice
name: $s_oem_serial_id_ext_properties_t
base: $s_base_properties_t
details:
    - "This structure can be passed as an extension structure to $sDeviceGetProperties via pNext member"
    - "Returns the OEM serial ID of the device"
members:
    - type: uint16_t
      name: length
      desc: "[out] OEM serial ID length"
    - type: char
      name: oemSerialId[$S_OEM_SERIAL_ID_SIZE]
      desc: "[out] OEM serial ID for the device."
