--- #--------------------------------------------------------------------------
type: header
desc: "Intel $OneApi Level-Zero Extension for retrieving kernel memory allocation properties."
version: "1.14"
--- #--------------------------------------------------------------------------
type: macro
desc: "Get Kernel Allocation Properties Extension Name"
version: "1.14"
name: $X_GET_KERNEL_ALLOCATION_PROPERTIES_EXP_NAME
value: '"$X_experimental_kernel_allocation_properties"'
--- #--------------------------------------------------------------------------
type: enum
desc: "Get Kernel Allocation Properties Extension Version(s)"
version: "1.14"
name: $x_kernel_get_allocation_properties_exp_version_t
etors:
    - name: "1_0"
      value: "$X_MAKE_VERSION( 1, 0 )"
      desc: "version 1.0"
--- #--------------------------------------------------------------------------
type: struct
desc: "Kernel allocation properties"
version: "1.14"
class: $xKernel
name: $x_kernel_allocation_exp_properties_t
base: $x_base_properties_t
members:
    - type: uint64_t
      name: base
      desc: "[out] base address of the allocation"
    - type: size_t
      name: size
      desc: "[out] size of allocation"
    - type: $x_memory_type_t
      name: type
      desc: "[out] type of allocation"
    - type: uint32_t
      name: argIndex
      desc: "[out] kernel argument index for current allocation, -1 for driver internal (not kernel argument) allocations"
--- #--------------------------------------------------------------------------
type: function
desc: "Retrieves kernel allocation properties."
version: "1.14"
class: $xKernel
name: GetAllocationPropertiesExp
decl: static
ordinal: "0"
details:
    - "A valid kernel handle must be created with $xKernelCreate."
    - "Returns array of kernel allocation properties for kernel handle."
    - "The application may call this function from simultaneous threads."
    - "The implementation of this function must be thread-safe."
params:
    - type: $x_kernel_handle_t
      name: hKernel
      desc: "[in] Kernel handle."
    - type: "uint32_t*"
      name: pCount
      desc: |
            [in,out] pointer to the number of kernel allocation properties.
            if count is zero, then the driver shall update the value with the total number of kernel allocation properties available.
            if count is greater than the number of kernel allocation properties available, then the driver shall update the value with the correct number of kernel allocation properties.
    - type: "$x_kernel_allocation_exp_properties_t*"
      name: pAllocationProperties
      desc: |
            [in,out][optional][range(0, *pCount)] array of kernel allocation properties.
            if count is less than the number of kernel allocation properties available, then driver shall only retrieve that number of kernel allocation properties.
